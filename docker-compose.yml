version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: bitcoin-postgres

    environment:
      POSTGRES_DB: bitcoin_gambler
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: